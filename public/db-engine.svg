<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke="#1c1c1c">
  <!-- Base background -->
  <rect width="800" height="600" fill="#f4f4f0" stroke="none"/>
  
  <!-- Architectural grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c1c1c" stroke-width="0.5" opacity="0.2" stroke-dasharray="1 3"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)" stroke="none"/>

  <!-- Border -->
  <rect width="796" height="596" x="2" y="2" fill="none" stroke="#1c1c1c" stroke-width="4"/>
  
  <!-- LSM Tree Visualization -->
  <g transform="translate(400, 240)" stroke="#1c1c1c" stroke-width="3" fill="#f4f4f0">
    
    <!-- L0 - MemTable (Highest Level) -->
    <g transform="translate(0, -100)">
      <ellipse cx="0" cy="0" rx="140" ry="40" />
      <path d="M-140,0 L-140,40 C-140,65 140,65 140,40 L140,0" />
      <text x="0" y="15" font-family="monospace" font-size="22" font-weight="bold" fill="#1c1c1c" text-anchor="middle" stroke="none">MemTable (L0)</text>
    </g>

    <!-- Connectors L0 -> L1 -->
    <path d="M-60,-50 L-150,60" stroke-dasharray="5 5" fill="none" />
    <path d="M60,-50 L150,60" stroke-dasharray="5 5" fill="none" />

    <!-- L1 - SSTables -->
    <g transform="translate(-160, 60)">
      <ellipse cx="0" cy="0" rx="100" ry="30" />
      <path d="M-100,0 L-100,30 C-100,50 100,50 100,30 L100,0" />
      <text x="0" y="10" font-family="monospace" font-size="16" fill="#1c1c1c" text-anchor="middle" stroke="none">SSTable (L1)</text>
    </g>
    
    <g transform="translate(160, 60)">
      <ellipse cx="0" cy="0" rx="100" ry="30" />
      <path d="M-100,0 L-100,30 C-100,50 100,50 100,30 L100,0" />
      <text x="0" y="10" font-family="monospace" font-size="16" fill="#1c1c1c" text-anchor="middle" stroke="none">SSTable (L1)</text>
    </g>

    <!-- Connectors L1 -> L2 -->
    <path d="M-200,100 L-260,190" stroke-dasharray="5 5" fill="none"/>
    <path d="M-120,100 L-80,190" stroke-dasharray="5 5" fill="none"/>
    <path d="M120,100 L80,190" stroke-dasharray="5 5" fill="none"/>
    <path d="M200,100 L260,190" stroke-dasharray="5 5" fill="none"/>

    <!-- L2 - SSTables (Deepest Level) -->
    <g transform="translate(-260, 200)">
      <ellipse cx="0" cy="0" rx="70" ry="20" />
      <path d="M-70,0 L-70,25 C-70,40 70,40 70,25 L70,0" />
    </g>
    <g transform="translate(-80, 200)">
      <ellipse cx="0" cy="0" rx="70" ry="20" />
      <path d="M-70,0 L-70,25 C-70,40 70,40 70,25 L70,0" />
    </g>
    <g transform="translate(80, 200)">
      <ellipse cx="0" cy="0" rx="70" ry="20" />
      <path d="M-70,0 L-70,25 C-70,40 70,40 70,25 L70,0" />
    </g>
    <g transform="translate(260, 200)">
      <ellipse cx="0" cy="0" rx="70" ry="20" />
      <path d="M-70,0 L-70,25 C-70,40 70,40 70,25 L70,0" />
    </g>
  </g>

  <!-- Technical UI Elements for Newspaper aesthetic -->
  <rect x="40" y="40" width="120" height="20" fill="#1c1c1c" stroke="none" />
  <text x="100" y="54" font-family="Courier New, monospace" font-size="12" fill="#f4f4f0" text-anchor="middle" stroke="none">LSM-TREE SPEC</text>
  
  <text x="40" y="80" font-family="Courier New, monospace" font-size="12" fill="#1c1c1c" stroke="none">COMPACTION_RATIO: 10</text>
  <text x="40" y="95" font-family="Courier New, monospace" font-size="12" fill="#1c1c1c" stroke="none">BLOCK_SIZE: 4KB</text>
  <text x="40" y="110" font-family="Courier New, monospace" font-size="12" fill="#1c1c1c" stroke="none">BLOOM_FILTER: TRUE</text>
</svg>